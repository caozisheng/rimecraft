name: Build macOS

on:
  workflow_dispatch:

jobs:
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - name: Install dependencies
        run: bun install

      - name: Build Tauri (macOS Apple Silicon)
        run: bun run build:tauri:macos-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rimecraft-macos-arm64
          path: |
            apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            apps/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

  build-macos-universal:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - name: Install dependencies
        run: bun install

      - name: Build Tauri (macOS Universal)
        run: bun run build:tauri:macos-universal

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rimecraft-macos-universal
          path: |
            apps/tauri/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            apps/tauri/src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app
