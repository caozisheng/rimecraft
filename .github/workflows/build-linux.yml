name: Build Linux

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - name: Install dependencies
        run: bun install

      - name: Build Tauri (Linux x64)
        run: bun run build:tauri:linux-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rimecraft-linux-x64
          path: |
            apps/tauri/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
            apps/tauri/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            apps/tauri/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/*.AppImage

  build-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri/src-tauri -> target

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.18"

      - name: Install dependencies
        run: bun install

      - name: Build Tauri (Linux ARM64)
        run: bun run build:tauri:linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rimecraft-linux-arm64
          path: |
            apps/tauri/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/deb/*.deb
            apps/tauri/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/rpm/*.rpm
            apps/tauri/src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/appimage/*.AppImage
